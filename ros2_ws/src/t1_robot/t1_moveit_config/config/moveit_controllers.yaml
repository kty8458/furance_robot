# MoveIt uses this configuration for controller management

# moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

# moveit_simple_controller_manager:
controller_names:
  - left_arm_controller
  - right_arm_controller
  - both_arm_controller

left_arm_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: true
  joints:
    - ARM-L-J1_Joint
    - ARM-L-J2_Joint
    - ARM-L-J3_Joint
    - ARM-L-J4_Joint
    - ARM-L-J5_Joint
    - ARM-L-J6_Joint
    - ARM-L-J7_Joint
right_arm_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: true
  joints:
    - ARM-R-J1_Joint
    - ARM-R-J2_Joint
    - ARM-R-J3_Joint
    - ARM-R-J4_Joint
    - ARM-R-J5_Joint
    - ARM-R-J6_Joint
    - ARM-R-J7_Joint
both_arm_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: true
  joints:
    - ARM-L-J1_Joint
    - ARM-L-J2_Joint
    - ARM-L-J3_Joint
    - ARM-L-J4_Joint
    - ARM-L-J5_Joint
    - ARM-L-J6_Joint
    - ARM-L-J7_Joint
    - ARM-R-J1_Joint
    - ARM-R-J2_Joint
    - ARM-R-J3_Joint
    - ARM-R-J4_Joint
    - ARM-R-J5_Joint
    - ARM-R-J6_Joint
    - ARM-R-J7_Joint